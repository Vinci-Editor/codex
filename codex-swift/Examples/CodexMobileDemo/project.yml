name: CodexMobileDemo
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "26.0"
packages:
  CodexSwift:
    path: ../..
targets:
  CodexMobileDemo:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: CodexMobileDemo
    info:
      path: CodexMobileDemo/Info.plist
      properties:
        CFBundleDisplayName: Codex
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocalNetworkUsageDescription: Codex can connect to local OpenAI-compatible providers such as LM Studio.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    dependencies:
      - package: CodexSwift
        product: CodexKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openai.CodexMobileDemo
        PRODUCT_NAME: CodexMobileDemo
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
